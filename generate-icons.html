<!DOCTYPE html><html><body>
<canvas id="c512" width="512" height="512"></canvas>
<canvas id="c192" width="192" height="192"></canvas>
<script>
function drawIcon(canvas) {
  const s = canvas.width;
  const ctx = canvas.getContext('2d');
  // Background
  ctx.fillStyle = '#0a0a0f';
  ctx.beginPath();
  ctx.roundRect(0, 0, s, s, s * 0.18);
  ctx.fill();
  // R
  ctx.font = `800 ${s * 0.52}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#ff3c6f';
  ctx.fillText('R', s * 0.32, s * 0.52);
  // A
  ctx.fillStyle = '#00e5a0';
  ctx.fillText('A', s * 0.68, s * 0.52);
}
drawIcon(document.getElementById('c512'));
drawIcon(document.getElementById('c192'));
</script>
